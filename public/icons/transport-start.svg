<svg viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- レッカー車のボディ -->
  <rect x="2" y="18" width="28" height="16" rx="3" fill="white"/>
  <!-- キャビン -->
  <rect x="22" y="10" width="14" height="12" rx="2" fill="white"/>
  <!-- クレーン/ブーム -->
  <line x1="28" y1="14" x2="44" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- フック -->
  <line x1="44" y1="8" x2="44" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- レッカー車のタイヤ -->
  <circle cx="10" cy="36" r="5" fill="white"/>
  <circle cx="10" cy="36" r="2.5" fill="none" stroke="#71A9F7" stroke-width="1.5"/>
  <circle cx="26" cy="36" r="5" fill="white"/>
  <circle cx="26" cy="36" r="2.5" fill="none" stroke="#71A9F7" stroke-width="1.5"/>
  <!-- 被牽引車 -->
  <rect x="38" y="20" width="22" height="12" rx="2" fill="white"/>
  <!-- 被牽引車のタイヤ -->
  <circle cx="44" cy="34" r="4" fill="white"/>
  <circle cx="56" cy="34" r="4" fill="white"/>
  <!-- 連結ロープ -->
  <line x1="36" y1="22" x2="44" y2="14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 2"/>
</svg>
